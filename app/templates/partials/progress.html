{% set p = resource_progress(resource, progress_mode) %}
<div class="progress" id="progress-{{ resource.id }}"{% if with_oob_progress %} hx-swap-oob="true"{% endif %}>
  <div class="bar"><span style="width: {{ p.percent }}%"></span></div>
  <span class="progress-label">{{ p.label }} · {{ p.percent }}%</span>
</div>
