<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LearnHub</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="/static/htmx.min.js"></script>
  <script>
    // Apply the saved progress mode before first paint (no flash of count mode).
    (function () {
      try {
        if (localStorage.getItem('lh-progress-mode') === 'time') {
          document.documentElement.classList.add('mode-time');
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">📚 LearnHub</a>
    <span class="tagline">個人學習中樞</span>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  {% include "partials/floating_progress.html" %}
  <script>
    // Any [data-progress-toggle] (toolbar button or floating card) flips the
    // global count/time mode. Delegated so it survives HTMX out-of-band swaps.
    document.addEventListener('click', function (e) {
      var toggle = e.target.closest('[data-progress-toggle]');
      if (!toggle) return;
      e.preventDefault();
      var time = document.documentElement.classList.toggle('mode-time');
      try {
        localStorage.setItem('lh-progress-mode', time ? 'time' : 'count');
      } catch (err) {}
    });

    // 輸出按鈕:把目前顯示的所有項目標題複製到剪貼簿(一行一個,可貼進試算表)。
    document.addEventListener('click', function (e) {
      var btn = e.target.closest('[data-export-titles]');
      if (!btn) return;
      e.preventDefault();
      var titles = Array.prototype.map
        .call(document.querySelectorAll('#resources-container .item-title'),
              function (el) { return el.textContent.trim(); })
        .filter(Boolean);
      var lbl = btn.querySelector('.export-lbl');
      if (!titles.length) { flashExport(lbl, '沒有項目'); return; }
      var text = titles.join('\n');
      function done() { flashExport(lbl, '已複製 ' + titles.length + ' 筆'); }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done, function () { fallbackCopy(text, done); });
      } else {
        fallbackCopy(text, done);
      }
    });
    function fallbackCopy(text, done) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (err) {}
      document.body.removeChild(ta);
      done();
    }
    function flashExport(lbl, msg) {
      if (!lbl) return;
      var prev = lbl.dataset.orig || lbl.textContent;
      lbl.dataset.orig = prev;
      lbl.textContent = msg;
      clearTimeout(lbl._t);
      lbl._t = setTimeout(function () { lbl.textContent = lbl.dataset.orig; }, 1600);
    }
  </script>
</body>
</html>
